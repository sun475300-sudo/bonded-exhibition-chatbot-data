# 보세전시장 챗봇 Nginx 리버스 프록시 설정
# 사용법: sudo cp deploy/nginx.conf /etc/nginx/sites-available/chatbot
#         sudo ln -s /etc/nginx/sites-available/chatbot /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx

# Rate limiting 설정 (10 requests/sec per IP)
limit_req_zone $binary_remote_addr zone=chatbot_limit:10m rate=10r/s;

upstream gunicorn {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # --- SSL/TLS 설정 (certbot으로 활성화) ---
    # 1) certbot certonly --nginx -d your-domain.com
    # 2) 아래 주석을 해제하고 listen 80 블록을 redirect로 변경
    #
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;
    # ssl_session_tickets off;
    # --- SSL/TLS 설정 끝 ---

    # --- HTTP -> HTTPS 리다이렉트 (SSL 활성화 시 별도 server 블록으로 분리) ---
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
    # --- 리다이렉트 끝 ---

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS (SSL 활성화 후 주석 해제)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # 정적 파일 캐싱 (web/ 디렉토리)
    location /static/ {
        alias /app/web/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 파비콘, 매니페스트, 서비스워커
    location ~* ^/(manifest\.json|sw\.js|favicon\.ico)$ {
        proxy_pass http://gunicorn;
        expires 1d;
    }

    # API 엔드포인트 - rate limiting 적용
    location /api/ {
        limit_req zone=chatbot_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # 기본 프록시 (웹 UI 등)
    location / {
        proxy_pass http://gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 로그
    access_log /var/log/nginx/chatbot_access.log;
    error_log /var/log/nginx/chatbot_error.log;
}
