<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보세전시장 민원응대 챗봇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #1a3a5c;
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .badge {
    background: #2d7d46;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .container {
    flex: 1;
    display: flex;
    max-width: 960px;
    width: 100%;
    margin: 0 auto;
    overflow: hidden;
  }

  /* 사이드바: FAQ 바로가기 */
  .sidebar {
    width: 260px;
    background: #fff;
    border-right: 1px solid #e0e0e0;
    overflow-y: auto;
    padding: 12px 0;
    display: none;
  }
  @media (min-width: 768px) { .sidebar { display: block; } }
  .sidebar h3 {
    font-size: 13px;
    color: #666;
    padding: 8px 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sidebar .faq-item {
    padding: 10px 16px;
    font-size: 13px;
    color: #333;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .sidebar .faq-item:hover {
    background: #f5f7fa;
    border-left-color: #1a3a5c;
  }
  .sidebar .cat-label {
    font-size: 11px;
    color: #999;
    display: block;
    margin-bottom: 2px;
  }

  /* 채팅 영역 */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #f7f8fa;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.bot {
    align-self: flex-start;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    align-self: flex-end;
    background: #1a3a5c;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg .meta {
    font-size: 11px;
    color: #999;
    margin-top: 6px;
  }
  .msg.bot .meta { color: #aaa; }
  .msg.user .meta { color: rgba(255,255,255,0.6); }

  .typing {
    align-self: flex-start;
    padding: 12px 16px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    font-size: 14px;
    color: #999;
    display: none;
  }
  .typing.show { display: block; }

  /* 입력 영역 */
  .input-area {
    padding: 16px 20px;
    background: #fff;
    border-top: 1px solid #e0e0e0;
    display: flex;
    gap: 10px;
  }
  .input-area input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid #d0d0d0;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-area input:focus { border-color: #1a3a5c; }
  .input-area button {
    padding: 12px 24px;
    background: #1a3a5c;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .input-area button:hover { background: #254d73; }
  .input-area button:disabled { background: #999; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>보세전시장 민원응대 챗봇</h1>
  <span class="badge">v2.0</span>
</header>

<div class="container">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="chat-area">
    <div class="messages" id="messages">
      <div class="typing" id="typing">답변을 생성하고 있습니다...</div>
    </div>
    <div class="input-area">
      <input type="text" id="queryInput" placeholder="질문을 입력하세요..." autofocus>
      <button id="sendBtn" onclick="sendQuery()">전송</button>
    </div>
  </main>
</div>

<script>
const messagesEl = document.getElementById('messages');
const typingEl = document.getElementById('typing');
const queryInput = document.getElementById('queryInput');
const sendBtn = document.getElementById('sendBtn');

const CATEGORY_NAMES = {};

// 초기화
async function init() {
  try {
    // 설정 로드
    const configRes = await fetch('/api/config');
    const config = await configRes.json();

    config.categories.forEach(c => { CATEGORY_NAMES[c.code] = c.name; });

    addBotMessage(config.persona);

    // FAQ 로드
    const faqRes = await fetch('/api/faq');
    const faqData = await faqRes.json();
    renderSidebar(faqData.items);
  } catch (e) {
    addBotMessage('챗봇 초기화 중 오류가 발생했습니다. 페이지를 새로고침 해주세요.');
  }
}

function renderSidebar(items) {
  const sidebar = document.getElementById('sidebar');
  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });

  let html = '<h3>자주 묻는 질문</h3>';
  for (const [cat, faqs] of Object.entries(grouped)) {
    faqs.forEach(faq => {
      const catName = CATEGORY_NAMES[cat] || cat;
      html += `<div class="faq-item" onclick="askFaq('${faq.question.replace(/'/g, "\\'")}')">
        <span class="cat-label">${catName}</span>
        ${faq.question}
      </div>`;
    });
  }
  sidebar.innerHTML = html;
}

function askFaq(question) {
  queryInput.value = question;
  sendQuery();
}

async function sendQuery() {
  const query = queryInput.value.trim();
  if (!query) return;

  addUserMessage(query);
  queryInput.value = '';
  sendBtn.disabled = true;
  typingEl.classList.add('show');
  scrollToBottom();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const data = await res.json();

    if (data.error) {
      addBotMessage(data.error);
    } else {
      const catName = CATEGORY_NAMES[data.category] || data.category;
      addBotMessage(data.answer, catName, data.is_escalation);
    }
  } catch (e) {
    addBotMessage('서버 연결 오류가 발생했습니다. 다시 시도해 주세요.');
  } finally {
    typingEl.classList.remove('show');
    sendBtn.disabled = false;
    queryInput.focus();
  }
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.textContent = text;
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  div.appendChild(meta);
  messagesEl.insertBefore(div, typingEl);
  scrollToBottom();
}

function addBotMessage(text, category, isEscalation) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.textContent = text;
  const meta = document.createElement('div');
  meta.className = 'meta';
  let metaText = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  if (category) metaText += ` | ${category}`;
  if (isEscalation) metaText += ' | 상담 연결 권고';
  meta.textContent = metaText;
  div.appendChild(meta);
  messagesEl.insertBefore(div, typingEl);
  scrollToBottom();
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

queryInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendQuery();
  }
});

init();
</script>
</body>
</html>
